<!DOCTYPE html>
<html>
<head>
    <title>CourtFlow 🏸</title>
    <link rel="stylesheet" href="static/courtflow.css">
</head>

<body>
    <div class="app">

        <aside class="sidebar">
            <select id="session-select">
                <option value=""
                    {% if not selected_session %}selected{% endif %}>
                    Choose session...
                </option>

                <option value="monday_league"
                    {% if selected_session == "monday_league" %}selected{% endif %}>
                    Monday League 7pm-9pm
                </option>

                <option value="tuesday_club"
                    {% if selected_session == "tuesday_club" %}selected{% endif %}>
                    Tuesday Group 6pm-7pm
                </option>

                <option value="thursday_casual"
                    {% if selected_session == "thursday_casual" %}selected{% endif %}>
                    Thursday Casual 7pm-9pm
                </option>
            </select>

            <button id="clear-courtflow">ClearBABABBANANA CourtFlow</button>
            <button id="start-session-btn">Start Session</button>
            <button id="end-session-btn" disabled>End Session</button>

            <h2>Players</h2>

            <div class="add-player-panel">
                <input id="new-player-name" type="text" placeholder="New player name">

                <select id="new-player-type">
                    <option value="player">Player</option>
                    <option value="coach">Coach</option>
                </select>

                <button id="add-player-btn">Add Player</button>
            </div>

            <div id="player-pool">
                <!-- {% for player in players %}
                    {% set bits = player.name.split() %}
                    {% set label = bits[0] ~ " " ~ bits[-1][:2] %}

                    <div class="player {% if player.type == 'coach' %}coach{% endif %}"
                        draggable="true"
                        data-status="waiting"
                        data-type="{{ player.type }}"
                        data-name="{{ player.name }}">
                        
                        <div class="player-label">{{ label }}</div>

                        {% if player.type == "coach" %}
                            <div class="coach-label">coach</div>
                        {% endif %}

                        <div class="player-stats">
                            <div class="player-stat matches-stat">G: 0</div>
                            <div class="player-stat waiting-stat">W: 0m</div>
                        </div>
                        <button class="remove-player-btn">
                            X
                        </button>
                    </div>
                    
                {% endfor %} -->
            </div>

            <h2>Suggested Next Match</h2>
            <div class="suggest-panel">
                <select id="suggest-mode">
                    <option value="doubles">Doubles</option>
                    <option value="singles">Singles</option>
                </select>

                <button id="suggest-match-btn">Suggest Match</button>

                <div id="suggested-match">
                    <p>No suggestion yet</p>
                </div>
            </div>
            
            <h2>Match History</h2>
            <div id="match-history-panel">
                <p class="empty-history">No matches yet</p>
            </div>
        </aside>

        <main class="court-area">
            <h1>CourtFlow</h1>

            <div class="mode-menu">
                <button class="mode-btn" data-mode="competition">Competition</button>
            </div>

            <div class="courts">
                <div class="courts">
    <div class="court-card">
        <h2>Court 1</h2>
        <p class="timer-display">00:00</p>

        <div class="court-dropzone">
            <div class="court-half team-a"><p>Team A</p></div>
            <div class="court-half team-b"><p>Team B</p></div>
        </div>

        <div class="court-mode">
            <button class="court-mode-btn active" data-mode="doubles">Doubles</button>
            <button class="court-mode-btn" data-mode="singles">Singles</button>
        </div>

        <div class="buttons">
            <button class="start-stop-btn">Start Game</button>
            <button class="assign-btn">Auto Assign</button>
            <button class="clear-btn">Clear Court</button>
            <button class="disable-btn">Disable Court</button>
        </div>
    </div>

    <div class="court-card">
        <h2>Court 2</h2>
        <p class="timer-display">00:00</p>

        <div class="court-dropzone">
            <div class="court-half team-a"><p>Team A</p></div>
            <div class="court-half team-b"><p>Team B</p></div>
        </div>

        <div class="court-mode">
            <button class="court-mode-btn active" data-mode="doubles">Doubles</button>
            <button class="court-mode-btn" data-mode="singles">Singles</button>
        </div>

        <div class="buttons">
            <button class="start-stop-btn">Start Game</button>
            <button class="assign-btn">Auto Assign</button>
            <button class="clear-btn">Clear Court</button>
            <button class="disable-btn">Disable Court</button>
        </div>
    </div>

    <div class="court-card">
        <h2>Court 3</h2>
        <p class="timer-display">00:00</p>

        <div class="court-dropzone">
            <div class="court-half team-a"><p>Team A</p></div>
            <div class="court-half team-b"><p>Team B</p></div>
        </div>

        <div class="court-mode">
            <button class="court-mode-btn active" data-mode="doubles">Doubles</button>
            <button class="court-mode-btn" data-mode="singles">Singles</button>
        </div>

        <div class="buttons">
            <button class="start-stop-btn">Start Game</button>
            <button class="assign-btn">Auto Assign</button>
            <button class="clear-btn">Clear Court</button>
            <button class="disable-btn">Disable Court</button>
        </div>
    </div>

    <div class="court-card">
        <h2>Court 4</h2>
        <p class="timer-display">00:00</p>

        <div class="court-dropzone">
            <div class="court-half team-a"><p>Team A</p></div>
            <div class="court-half team-b"><p>Team B</p></div>
        </div>

        <div class="court-mode">
            <button class="court-mode-btn active" data-mode="doubles">Doubles</button>
            <button class="court-mode-btn" data-mode="singles">Singles</button>
        </div>

        <div class="buttons">
            <button class="start-stop-btn">Start Game</button>
            <button class="assign-btn">Auto Assign</button>
            <button class="clear-btn">Clear Court</button>
            <button class="disable-btn">Disable Court</button>
        </div>
    </div>
</div>

            </div>
        </main>

    </div>

<script src="static/history.js"></script>
